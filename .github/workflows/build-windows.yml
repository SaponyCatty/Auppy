name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Auppy Windows Installer
    runs-on: windows-2025

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Enable pnpm with Corepack
        shell: pwsh
        run: |
          corepack enable pnpm
          corepack install
          pnpm --version
          Get-Command pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows installer
        run: pnpm tauri build

      - name: List Windows bundle outputs
        shell: pwsh
        run: |
          Get-ChildItem -Recurse src-tauri/target/release/bundle

      - name: Upload Windows EXE artifact
        uses: actions/upload-artifact@v6
        with:
          name: Auppy-Windows-Installer
          path: src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error
